name: SEO Audit Generation Frontend Build and Test

on:
    workflow_dispatch:
    push:
        paths:
            - 'frontend/**'

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Install dependencies
              run: npm install
              working-directory: ./frontend

            - name: Build the frontend
              run: npm run build
              working-directory: ./frontend

            - name: Run tests
              run: npm test
              working-directory: ./frontend